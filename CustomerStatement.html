<div class="container mt-4">
  <div class="card shadow border-0">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Customer Ledger Statement</h5>
      <button class="btn btn-sm btn-light no-print" onclick="window.print()">Print Report</button>
    </div>
    
    <div class="card-body">
      <div id="customerProfile" class="row mb-4 p-3 border rounded bg-white d-none shadow-sm">
        <div class="col-md-6 border-end">
          <p class="mb-1"><strong>Name:</strong> <span id="pName" class="text-primary"></span></p>
          <p class="mb-1"><strong>ID:</strong> <span id="pID"></span></p>
          <p class="mb-1"><strong>Mobile:</strong> <span id="pMobile"></span></p>
        </div>
        <div class="col-md-6 ps-md-4">
          <p class="mb-1"><strong>Area:</strong> <span id="pArea"></span></p>
          <p class="mb-1"><strong>Address:</strong> <span id="pAddress"></span></p>
          <p class="mb-1 text-muted small"><strong>Report Generated:</strong> <span id="pDate"></span></p>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover table-bordered">
          <thead class="table-dark">
            <tr class="text-center">
              <th>Date</th>
              <th>Description</th>
              <th>Voucher</th>
              <th>Bill (Dr)</th>
              <th>Paid (Cr)</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody id="statementRows">
            <tr><td colspan="6" class="text-center text-muted py-4">Search with Customer ID to view ledger.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>



<script>
  // আপনার প্রদানকৃত URL
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTeOGvSd2EaxCZMouhcjZHaHuaUxJTBySk-5d2okEY3_YGyfBohszmkGHaq0pGo4B9ng/exec";

  async function loadCustomerLedger(custCode) {
    if (!custCode) return alert("Please enter ID");
    
    const profileDiv = document.getElementById('customerProfile');
    const tableBody = document.getElementById('statementRows');
    
    try {
      const response = await fetch(`${SCRIPT_URL}?action=getCustomerStatement&custCode=${custCode}`);
      const res = await response.json();

      if (res.status === "success") {
        // প্রোফাইল আপডেট
        profileDiv.classList.remove('d-none');
        document.getElementById('pName').innerText = res.info.name;
        document.getElementById('pID').innerText = res.info.code;
        document.getElementById('pMobile').innerText = res.info.mobile;
        document.getElementById('pArea').innerText = res.info.area;
        document.getElementById('pAddress').innerText = res.info.address;
        document.getElementById('pDate').innerText = new Date().toLocaleString();

        // টেবিল ডাটা আপডেট
        let rowsHtml = "";
        res.data.forEach(item => {
          rowsHtml += `
            <tr>
              <td class="text-center">${item.date}</td>
              <td>${item.description}</td>
              <td class="text-center">${item.voucher || '-'}</td>
              <td class="text-end text-danger">${item.bill > 0 ? item.bill.toFixed(2) : '-'}</td>
              <td class="text-end text-success">${item.paid > 0 ? item.paid.toFixed(2) : '-'}</td>
              <td class="text-end fw-bold">${item.balance.toFixed(2)}</td>
            </tr>`;
        });
        tableBody.innerHTML = rowsHtml;
      } else {
        alert(res.message);
        profileDiv.classList.add('d-none');
        tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Data Not Found!</td></tr>';
      }
    } catch (err) {
      console.error("Error fetching data:", err);
    }
  }
</script>
