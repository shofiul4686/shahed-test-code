
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8f9fa; }
    .statement-header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px 10px 0 0; }
    .search-section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .table thead { background-color: #34495e; color: white; }
    .text-bill { color: #e74c3c; font-weight: bold; } /* Expense/Debit */
    .text-paid { color: #27ae60; font-weight: bold; } /* Deposit/Credit */
    .total-row { background-color: #f1f2f6; font-weight: bold; }
    
    @media print {
      .no-print { display: none !important; }
      body { background: white; padding: 0; }
      .container { width: 100%; max-width: 100%; }
      .card { border: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="row justify-content-center no-print mb-4">
    <div class="col-md-7">
      <div class="search-section text-center">
        <h4 class="mb-3">কাস্টমার স্টেটমেন্ট অনুসন্ধান</h4>
        <div class="input-group">
          <input type="text" id="custCodeInput" class="form-control" placeholder="কাস্টমার কোড (উদাঃ NEP-0001)">
          <button class="btn btn-primary px-4" onclick="loadStatement()">অনুসন্ধান</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="statement-header d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-0">লেজার স্টেটমেন্ট - M/S Noor Enterprise</h5>
        <small id="custDisplayTitle">কাস্টমার আইডি: - </small>
      </div>
      <button class="btn btn-sm btn-light no-print" onclick="window.print()">প্রিন্ট করুন</button>
    </div>
    
    <div class="card-body">
      <div id="loader" class="text-center d-none my-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">ডাটা প্রসেস হচ্ছে...</p>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
          <thead>
            <tr>
              <th class="text-center">তারিখ</th>
              <th>বিবরণ (Particulars)</th>
              <th class="text-center">ভাউচার</th>
              <th class="text-end">বিল (Dr)</th>
              <th class="text-end">জমা (Cr)</th>
              <th class="text-end">ব্যালেন্স (Due)</th>
            </tr>
          </thead>
          <tbody id="statementTableBody">
            <tr>
              <td colspan="6" class="text-center text-muted py-4">তথ্য দেখার জন্য কাস্টমার কোড দিন।</td>
            </tr>
          </tbody>
          <tfoot id="tableFooter" class="d-none">
            <tr class="total-row">
              <td colspan="3" class="text-end">সর্বমোট:</td>
              <td id="totalBill" class="text-end text-bill">0.00</td>
              <td id="totalPaid" class="text-end text-paid">0.00</td>
              <td id="finalBalance" class="text-end">0.00</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // আপনার Apps Script Web App URL এখানে দিন
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzTeOGvSd2EaxCZMouhcjZHaHuaUxJTBySk-5d2okEY3_YGyfBohszmkGHaq0pGo4B9ng/exec"; 

  async function loadStatement() {
    const custCode = document.getElementById('custCodeInput').value.trim();
    if (!custCode) return alert("অনুগ্রহ করে কাস্টমার আইডি প্রদান করুন।");

    const tableBody = document.getElementById('statementTableBody');
    const loader = document.getElementById('loader');
    const footer = document.getElementById('tableFooter');
    
    loader.classList.remove('d-none');
    tableBody.innerHTML = '';
    footer.classList.add('d-none');

    try {
      const response = await fetch(`${WEB_APP_URL}?action=getCustomerStatement&custCode=${custCode}`);
      const result = await response.json();

      loader.classList.add('d-none');

      if (result.status === "success" && result.data.length > 0) {
        document.getElementById('custDisplayTitle').innerText = "কাস্টমার আইডি: " + custCode.toUpperCase();
        
        let rows = '';
        let totalBill = 0;
        let totalPaid = 0;

        result.data.forEach(item => {
          totalBill += item.bill;
          totalPaid += item.paid;
          
          rows += `
            <tr>
              <td class="text-center small">${item.date}</td>
              <td>${item.description || '-'}</td>
              <td class="text-center"><span class="badge bg-light text-dark border">${item.voucher || '-'}</span></td>
              <td class="text-end text-bill">${item.bill > 0 ? item.bill.toLocaleString() : '-'}</td>
              <td class="text-end text-paid">${item.paid > 0 ? item.paid.toLocaleString() : '-'}</td>
              <td class="text-end fw-bold">${item.balance.toLocaleString()}</td>
            </tr>
          `;
        });

        tableBody.innerHTML = rows;
        document.getElementById('totalBill').innerText = totalBill.toLocaleString();
        document.getElementById('totalPaid').innerText = totalPaid.toLocaleString();
        document.getElementById('finalBalance').innerText = result.data[result.data.length - 1].balance.toLocaleString();
        footer.classList.remove('d-none');
        
      } else {
        tableBody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">দুঃখিত! এই কাস্টমারের কোনো রেকর্ড পাওয়া যায়নি।</td></tr>`;
      }
    } catch (err) {
      loader.classList.add('d-none');
      alert("সার্ভার এরর! কানেকশন চেক করুন।");
    }
  }
</script>

</body>
</html>
