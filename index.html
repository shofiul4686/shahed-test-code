<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/619/619153.png">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; margin: 0;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%; max-width: 400px; text-align: center;
        }
        /* লোগো আইকন স্টাইল */
        .logo-img { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .form-control:focus { box-shadow: 0 0 10px rgba(30, 60, 114, 0.2); border-color: #1e3c72; }
        .btn-login {
            background: #1e3c72; color: white; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold;
            width: 100%; transition: 0.3s; cursor: pointer;
        }
        .btn-login:hover { background: #2a5298; transform: translateY(-2px); }
        .btn-login:disabled { background: #6c757d; cursor: not-allowed; }
        #msg { margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: 500; }

		.company-name-bn {
        font-family: 'SolaimanLipi', 'Segoe UI', sans-serif;
        font-weight: 900;
        background: linear-gradient(to bottom, #1e3c72, #2a5298);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2px;
        font-size: 1.8rem;
    }

    .company-name-en {
        font-size: 0.9rem;
        font-weight: 700;
        color: #555;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    .brand-divider {
        width: 60px;
        height: 3px;
        background: #f1c40f; /* গোল্ডেন ডিভাইডার */
        margin: 0 auto;
        border-radius: 5px;
    }

    .logo-img {
        width: 70px;
        margin-bottom: 15px;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }
    </style>
</head>
<body>

   <div class="login-card">
    <img src="https://cdn-icons-png.flaticon.com/512/619/619153.png" alt="Logo" class="logo-img">
    
    <div class="brand-section mb-4">
        <h2 class="company-name-bn">মেসার্স নূর এন্টারপ্রাইজ</h2>
        
        <div class="brand-divider"></div>
    </div>

    <p class="text-muted mb-4" style="font-size: 0.85rem; letter-spacing: 1px;"> LOGIN PLEASE</p>
    
    <input type="text" id="userid" class="form-control" placeholder="User ID" autocomplete="off">
    <input type="password" id="password" class="form-control" placeholder="Password">
    
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login</button>
    
    <div id="msg"></div>
</div>

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxwBXVROsZF5WcdlDpPUHCTDhoZYHrZka0Y-RKM6ggphitVLxFaj2W-ZxXIVTc9-7oh/exec"; 

    async function handleLogin() {
        const id = document.getElementById('userid').value.trim();
        const pass = document.getElementById('password').value.trim();
        const msg = document.getElementById('msg');
        const btn = document.getElementById('loginBtn');

        if (!id || !pass) {
            msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle"></i> আইডি এবং পাসওয়ার্ড দিন!</span>';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
        msg.innerHTML = '<span class="text-primary">সার্ভারের সাথে সংযোগ করা হচ্ছে...</span>';

        const finalUrl = `${SCRIPT_URL}?action=login&id=${encodeURIComponent(id)}&pass=${encodeURIComponent(pass)}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.status === "success") {
                msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle"></i> সফল হয়েছে! ড্যাশবোর্ডে পাঠানো হচ্ছে...</span>';
                
                localStorage.setItem('userName', data.name);
                localStorage.setItem('userId', data.userId);

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 500); 
                
            } else {
                msg.innerHTML = `<span class="text-danger"><i class="fas fa-times-circle"></i> ${data.message || "ভুল আইডি বা পাসওয়ার্ড!"}</span>`;
                resetBtn();
            }
        } catch (error) {
            msg.innerHTML = '<span class="text-danger"><i class="fas fa-wifi"></i> নেটওয়ার্ক সমস্যা!</span>';
            resetBtn();
        }
    }

    function resetBtn() {
        const btn = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.innerHTML = 'Login';
    }

    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
