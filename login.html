<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M/S Noor Enterprise - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; margin: 0;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%; max-width: 400px; text-align: center;
        }
        .logo-icon { font-size: 50px; color: #1e3c72; margin-bottom: 20px; }
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .form-control:focus { box-shadow: 0 0 10px rgba(30, 60, 114, 0.2); border-color: #1e3c72; }
        .btn-login {
            background: #1e3c72; color: white; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold;
            width: 100%; transition: 0.3s; cursor: pointer;
        }
        .btn-login:hover { background: #2a5298; transform: translateY(-2px); }
        .btn-login:disabled { background: #6c757d; cursor: not-allowed; }
        #msg { margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-university"></i></div>
        <h3 class="mb-2">Noor Enterprise</h3>
        <p class="text-muted mb-4">ERP System Login</p>
        
        <input type="text" id="userid" class="form-control" placeholder="User ID" autocomplete="off">
        <input type="password" id="password" class="form-control" placeholder="Password">
        
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login</button>
        
        <div id="msg"></div>
    </div>

    <script>
        // আপনার সঠিক Deployed Web App URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkDCX5zax-NuoSKRSxJIjL9Rx4MbtVxvm5QlrOEIxrTR-s3sVuRHJy_ISNIm3ehDYs/exec"; 

        async function handleLogin() {
            const id = document.getElementById('userid').value.trim();
            const pass = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');

            if (!id || !pass) {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle"></i> আইডি এবং পাসওয়ার্ড দিন!</span>';
                return;
            }

            // UI state change
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';
            msg.innerHTML = '<span class="text-primary">সার্ভারের সাথে সংযোগ করা হচ্ছে...</span>';

            const finalUrl = `${SCRIPT_URL}?action=login&id=${encodeURIComponent(id)}&pass=${encodeURIComponent(pass)}`;

            try {
                const response = await fetch(finalUrl);
                const data = await response.json();

                if (data.status === "success") {
                    msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle"></i> সফল হয়েছে! ড্যাশবোর্ডে পাঠানো হচ্ছে...</span>';
                    
                    // সেশনে ডাটা সেভ করা (যাতে index.html এ ইউজ করা যায়)
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userId', data.userId);

                    setTimeout(() => {
                        window.location.href = `index.html?name=${encodeURIComponent(data.name)}&id=${encodeURIComponent(data.userId)}`;
                    }, 1200);
                } else {
                    msg.innerHTML = `<span class="text-danger"><i class="fas fa-times-circle"></i> ${data.message || "ভুল আইডি বা পাসওয়ার্ড!"}</span>`;
                    resetBtn();
                }
            } catch (error) {
                console.error("Error Detail:", error);
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-wifi"></i> নেটওয়ার্ক সমস্যা বা সার্ভার ইরর!</span>';
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = false;
            btn.innerHTML = 'Login';
        }

        // Enter কী চাপলে লগইন ট্রিগার করা
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
